<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentas Casita</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</head>

<body class="app-root p-6">

    <div class="max-w-4xl mx-auto card p-6 mb-6">
        <h1 id="main-title" class="main-title">Cuentas Casita</h1>
        <table class="w-full border-collapse border border-black">
            <thead>
                <tr>
                    <th class="p-3 border border-gray-300">Servicio</th>
                    <th class="p-3 border border-gray-300">Link</th>
                    <th class="p-3 border border-gray-300">Número Usuario</th>
                    <th class="p-3 border border-gray-300">Estado</th>
                    <th class="p-3 border border-gray-300">Monto</th>
                    <th class="p-3 border border-gray-300">Acción</th>
                </tr>
            </thead>
            <tbody id="current-month-container">
                <!-- Dynamic content -->
            </tbody>
        </table>
        <div class="mt-4 flex items-center" style="gap:12px;">
            <button id="edit-btn" class="btn-edit">Editar</button>
            <button id="cancel-btn" class="btn-edit" style="display:none;">Cancelar</button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto card p-6">
        <h2 class="section-title">Historial de Pagos</h2>
        <table class="w-full border-collapse border border-gray-300">
            <thead>
                <tr>
                    <th class="p-3 border border-gray-300">Servicio</th>
                    <th class="p-3 border border-gray-300">Mes</th>
                    <th class="p-3 border border-gray-300">Estado</th>
                    <th class="p-3 border border-gray-300">Monto</th>
                </tr>
            </thead>
            <tbody id="payments-container">
                <!-- Dynamic content -->
            </tbody>
        </table>
    </div>

</body>

</html>
