name: Build and Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: |
          mkdir -p public
          cat > public/env.js <<EOF
          window.__ENV__ = {
            SUPABASE_URL: "${{ secrets.SUPABASE_URL }}",
            SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
          }
          EOF

      - name: Build
        run: npm run build || true

      - name: Prepare public folder
        run: |
          mkdir -p public
          cp index.html public/ || true
          cp app.js public/ || true
          cp config.js public/ || true
          cp styles.css public/ || true
          # copy any static assets or build output if present
          if [ -d build ]; then cp -r build/* public/; fi
          if [ -d dist ]; then cp -r dist/* public/; fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public